<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>ParkNow.TW — 停車場查詢（手機版）</title>
<link rel="icon" type="image/png" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── CSS 設計系統 ── */
:root {
  --bg-primary:    #ffffff;
  --bg-secondary:  #fafafa;
  --bg-surface:    #f4f4f5;
  --border-color:  #ebebeb;
  --text-primary:  #111111;
  --text-secondary:#666666;
  --text-muted:    #aaaaaa;
  --accent:        #3b82f6;
  --accent-light:  #eff6ff;
  --accent-border: #bfdbfe;
  --accent-text:   #1d4ed8;
  --pin-monthly:   #f97316;
  --available-ok:  #10b981;
  --available-warn:#f97316;
  --navbar-h:      48px;
  --filterbar-h:   36px;
  --cardstrip-h:   110px;
}
[data-theme="dark"] {
  --bg-primary:    #1a2332;
  --bg-secondary:  #0d1117;
  --bg-surface:    #243044;
  --border-color:  #2d3f55;
  --text-primary:  #f0f6fc;
  --text-secondary:#8b9ab0;
  --text-muted:    #4d6070;
  --accent:        #3b82f6;
  --accent-light:  #1a3a6b;
  --accent-border: #3b82f6;
  --accent-text:   #60a5fa;
}

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  height: 100%;
  overflow: hidden;
}
body {
  font-family: 'Noto Sans TC', -apple-system, 'PingFang TC', sans-serif;
  background: var(--bg-secondary);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
}

/* ── Navbar ── */
#navbar {
  position: sticky;
  top: 0;
  z-index: 1000;
  height: var(--navbar-h);
  background: var(--bg-primary);
  border-bottom: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  padding: 0 10px;
  gap: 6px;
  flex-shrink: 0;
}
.nav-left { display: flex; align-items: center; flex-shrink: 0; }
.logo { font-size: 1rem; font-weight: 700; color: var(--text-primary); white-space: nowrap; }
.logo-tw { color: var(--text-secondary); font-weight: 400; }
.nav-center { flex: 1; display: flex; align-items: center; position: relative; min-width: 0; }
.search-wrap { display: flex; align-items: center; width: 100%; gap: 4px; position: relative; }
#addressSearch {
  flex: 1;
  height: 30px;
  padding: 0 8px;
  border: 1px solid var(--border-color);
  border-radius: 6px;
  font-size: .8rem;
  font-family: inherit;
  background: var(--bg-surface);
  color: var(--text-primary);
  outline: none;
  min-width: 0;
  transition: border-color .15s;
}
#addressSearch:focus { border-color: var(--accent); background: var(--bg-primary); }
#searchBtn {
  height: 30px;
  padding: 0 8px;
  border: 1px solid var(--border-color);
  border-radius: 6px;
  background: var(--bg-surface);
  color: var(--text-primary);
  cursor: pointer;
  font-size: .8rem;
  flex-shrink: 0;
  transition: all .15s;
}
#searchBtn:hover { border-color: var(--accent); background: var(--accent-light); }
#searchMsg {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  right: 0;
  font-size: .72rem;
  padding: 4px 8px;
  border-radius: 4px;
  display: none;
  z-index: 1001;
  white-space: nowrap;
}
#searchMsg.search-msg--error { display: block; background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
#searchMsg.search-msg--success { display: block; background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
.nav-right { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
#citySel {
  height: 30px;
  padding: 0 4px;
  border: 1px solid var(--border-color);
  border-radius: 6px;
  font-size: .75rem;
  font-family: inherit;
  background: var(--bg-surface);
  color: var(--text-primary);
  cursor: pointer;
  outline: none;
}
.btn-icon {
  height: 30px;
  min-width: 30px;
  padding: 0 6px;
  border: 1px solid var(--border-color);
  border-radius: 6px;
  background: var(--bg-surface);
  color: var(--text-primary);
  cursor: pointer;
  font-size: .85rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s;
}
.btn-icon:hover { border-color: var(--accent); background: var(--accent-light); }

/* ── Filter Bar ── */
#filterBar {
  position: sticky;
  top: var(--navbar-h);
  z-index: 999;
  background: var(--bg-primary);
  border-bottom: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  padding: 0 8px;
  gap: 5px;
  overflow-x: auto;
  flex-shrink: 0;
  min-height: var(--filterbar-h);
  flex-wrap: nowrap;
}
#filterBar::-webkit-scrollbar { height: 0; }
.filter-selects { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
#filterBar select {
  height: 26px;
  padding: 0 5px;
  border: 1px solid var(--border-color);
  border-radius: 5px;
  font-size: .72rem;
  font-family: inherit;
  background: var(--bg-surface);
  color: var(--text-primary);
  cursor: pointer;
  outline: none;
  white-space: nowrap;
}
#filterBar select:hover { border-color: var(--accent); }
.filter-pills { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.pill {
  height: 26px;
  padding: 0 9px;
  border: 1.5px solid var(--border-color);
  border-radius: 13px;
  font-size: .72rem;
  font-family: inherit;
  background: var(--bg-primary);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.pill:hover { border-color: var(--accent); color: var(--accent); }
.pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.filter-meta { margin-left: auto; flex-shrink: 0; }
#resultCount { font-size: .7rem; color: var(--text-muted); white-space: nowrap; }
.day-label {
  font-size: .65rem;
  padding: 2px 7px;
  border-radius: 10px;
  font-weight: 600;
  white-space: nowrap;
}
.day-label.holiday { background: #fff7ed; color: #c2410c; }
.day-label.weekday { background: var(--accent-light); color: var(--accent-text); }
[data-theme="dark"] .day-label.holiday { background: rgba(249,115,22,.2); color: #fb923c; }
[data-theme="dark"] .day-label.weekday { background: var(--accent-light); color: var(--accent-text); }

/* ── Mobile List ── */
#mobileList {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
  background: var(--bg-secondary);
}
#mobileList::-webkit-scrollbar { width: 4px; }
#mobileList::-webkit-scrollbar-track { background: var(--bg-surface); }
#mobileList::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }

/* ── Mobile Card ── */
.mobile-card {
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 14px 14px 12px 16px;
  margin-bottom: 10px;
  border-left: 4px solid var(--border-color);
  transition: border-left-color .2s;
}
.mobile-card.vac-ok  { border-left-color: var(--available-ok); }
.mobile-card.vac-warn { border-left-color: #ef4444; }
.mobile-card.vac-na  { border-left-color: var(--border-color); }

/* ── 卡片頂部：名稱 + 空位 badge ── */
.mc-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 6px;
}
.mc-name {
  font-size: .95rem;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.35;
  flex: 1;
}

/* ── 空位大 badge ── */
.mc-vacancy {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-width: 52px;
  padding: 4px 8px;
  border-radius: 8px;
  font-weight: 700;
  line-height: 1.2;
}
.mc-vacancy.vac-ok   { background: #d1fae5; color: #065f46; }
.mc-vacancy.vac-warn { background: #fee2e2; color: #991b1b; }
.mc-vacancy.vac-na   { background: var(--bg-surface); color: var(--text-muted); }
[data-theme="dark"] .mc-vacancy.vac-ok   { background: rgba(16,185,129,.2); color: #6ee7b7; }
[data-theme="dark"] .mc-vacancy.vac-warn { background: rgba(239,68,68,.2);  color: #fca5a5; }
.mc-vacancy-num  { font-size: 1.1rem; }
.mc-vacancy-label { font-size: .6rem; font-weight: 600; }

/* ── 次要資訊列 ── */
.mc-sub {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: .73rem;
  color: var(--text-secondary);
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.mc-sub-sep { color: var(--border-color); }
.mc-dist { color: var(--available-ok); font-weight: 600; }

/* ── 費率摘要列 ── */
.mc-rate-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.mc-rate-summary {
  font-size: .78rem;
  color: var(--text-secondary);
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.mc-rate-item { display: flex; align-items: center; gap: 3px; }
.mc-rate-item .val { font-weight: 700; color: var(--text-primary); }
.mc-rate-monthly { color: var(--pin-monthly); font-weight: 700; }

/* ── badges ── */
.mc-badges { display: flex; gap: 4px; flex-shrink: 0; }
.badge { font-size: .6rem; padding: 2px 7px; border-radius: 5px; font-weight: 600; }
.badge-type { background: var(--accent-light); color: var(--accent-text); }
.badge-monthly { background: #fff7ed; color: #c2410c; }
[data-theme="dark"] .badge-monthly { background: rgba(249,115,22,.15); color: #fb923c; }

.btn-nav {
  font-size: .73rem;
  color: var(--accent-text);
  text-decoration: none;
  padding: 5px 12px;
  border: 1px solid var(--accent);
  border-radius: 6px;
  transition: all .15s;
  background: var(--bg-primary);
  white-space: nowrap;
  flex-shrink: 0;
}
.btn-nav:hover { background: var(--accent); color: #fff; }

/* ── No Results / Error ── */
.no-results {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  color: var(--text-muted);
  font-size: .85rem;
  gap: 8px;
  text-align: center;
}
.no-results-icon { font-size: 2rem; }
.list-error {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  background: #fef2f2;
  color: #dc2626;
  border-radius: 8px;
  font-size: .82rem;
}
[data-theme="dark"] .list-error { background: rgba(220,38,38,.15); }

/* ── Geo message ── */
#geoMsg {
  display: none;
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,.75);
  color: #fff;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: .78rem;
  z-index: 2000;
  white-space: nowrap;
}
#geoMsg.show { display: block; }

/* ── Availability status bar ── */
#availBar {
  display: none;
  position: fixed;
  bottom: 16px;
  right: 12px;
  background: rgba(255,255,255,.95);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  padding: 5px 10px;
  font-size: .72rem;
  color: var(--text-secondary);
  z-index: 2001;
  backdrop-filter: blur(4px);
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
}
#availBar.show { display: block; }
[data-theme="dark"] #availBar { background: rgba(26,35,50,.97); border-color: var(--border-color); }
</style>
</head>
<body>

<div id="filterBar">
  <div class="filter-selects">

<!-- ── Mobile List ── -->
<div id="mobileList"></div>

<!-- ── Geo Message ── -->
<div id="geoMsg"></div>

<!-- ── Availability Status Bar ── -->

<!-- ── Scripts ── -->
<script src="parking_data.js"></script>
<script>
(function() {
'use strict';

/* ── 城市設定 ── */
var CITIES = {
  kaohsiung: { label: '高雄', varName: 'PARKING_DATA',       file: null,             center: [22.6273, 120.3014], zoom: 12 },
  tainan:    { label: '台南', varName: 'PARKING_DATA_TAINAN', file: 'data_tainan.js', center: [22.9999, 120.2269], zoom: 12 },
  chiayi:    { label: '嘉義', varName: 'PARKING_DATA_CHIAYI', file: 'data_chiayi.js', center: [23.4801, 120.4491], zoom: 12 }
};

/* ── 全域狀態 ── */
var D = (typeof PARKING_DATA !== 'undefined') ? PARKING_DATA : [];
var CITY_CACHE = { kaohsiung: D.length ? D : null };
var currentCity = 'kaohsiung';

var refCoord = { lat: null, lng: null, source: null };

var filterState = {
  cDistrict: '',
  cType: '',
  cPH: '',
  cPM: '',
  cDistKm: '',
  cVacancy: false,
  cMonthly: false,
  cCube: false
};

/* ── 工具函式 ── */
function esc(s) {
  if (!s) return '';
  var d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function hlM(text) {
  if (!text) return '';
  return text.replace(/(月租|計月|每月)/g, '<span class="hl">$1</span>');
}

function calcDist(lat1, lng1, lat2, lng2) {
  var R = 6371000;
  var dLat = (lat2 - lat1) * Math.PI / 180;
  var dLng = (lng2 - lng1) * Math.PI / 180;
  var a = Math.sin(dLat/2) * Math.sin(dLat/2) +
          Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
          Math.sin(dLng/2) * Math.sin(dLng/2);
  var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

function fmtDist(m) {
  if (m === undefined || m === null) return '';
  if (m < 1000) return Math.round(m) + 'm';
  return (m / 1000).toFixed(1) + 'km';
}

function buildNavUrl(p) {
  return 'https://www.google.com/maps/dir/?api=1&destination=' + p.lat + ',' + p.lng;
}

function buildNominatimUrl(address) {
  return 'https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=tw&q=' + encodeURIComponent(address);
}

/* ── 假日判斷（含國定假日 API）── */
var _holidayCache = null;

function isHoliday(dateStr) {
  if (!dateStr) {
    var now = new Date();
    var y = now.getFullYear();
    var m = String(now.getMonth() + 1).padStart(2, '0');
    var d = String(now.getDate()).padStart(2, '0');
    dateStr = '' + y + m + d;
  }
  if (_holidayCache && _holidayCache.dates.has(dateStr)) return true;
  var day = new Date(
    parseInt(dateStr.slice(0,4)),
    parseInt(dateStr.slice(4,6)) - 1,
    parseInt(dateStr.slice(6,8))
  ).getDay();
  return day === 0 || day === 6;
}

function loadHolidayData() {
  var year = new Date().getFullYear();
  if (_holidayCache && _holidayCache.year === year) return;
  var url = 'https://cdn.jsdelivr.net/gh/ruyut/TaiwanCalendar/data/' + year + '.json';
  fetch(url)
    .then(function(res) { return res.json(); })
    .then(function(data) {
      var dates = new Set();
      data.forEach(function(item) {
        if (item.isHoliday) dates.add(item.date);
      });
      _holidayCache = { year: year, dates: dates };
      // 資料載入後重新解析費率並重新渲染
      parseData(D);
      render();
      updateDayLabel();
    })
    .catch(function() {});
}

function updateDayLabel() {
  var dayEl = document.getElementById('dayLabel');
  if (!dayEl) return;
  var holiday = isHoliday();
  dayEl.textContent = holiday ? '📅 假日費率' : '📅 平日費率';
  dayEl.className = 'day-label ' + (holiday ? 'holiday' : 'weekday');
}

/* ── parseData ── */
function parseData(arr) {
  var holiday = isHoliday();
  arr.forEach(function(p) {
    var cw = (p.chargeway || '').replace(/,/g, '');

    // 將各種「每小時N元」格式統一換算成每半小時費率
    function parseHalfHour(text) {
      var m;
      // 每半小時N元 / 半小時N元 / N元/0.5hr / N元/0.5H
      m = text.match(/每半小時(\d+)元/) || text.match(/半小時(\d+)元/) ||
          text.match(/(\d+)元\/0\.5\s*[hH][rR]?/) || text.match(/(\d+)元\/0\.5\s*[hH]/);
      if (m) return parseInt(m[1], 10);
      // N元/時 / N元/H / N元/hr / N元/1hr（每小時，換算成半小時）
      m = text.match(/(\d+)元\/[時时]/) || text.match(/(\d+)元\/[Hh][Rr]?/) ||
          text.match(/(\d+)元\/1\s*[hH][rR]?/) || text.match(/(\d+)\/[Hh]\b/) ||
          text.match(/計時(\d+)元\/時/);
      if (m) return Math.round(parseInt(m[1], 10) / 2);
      // N小時N元 / 1小時N元（每小時，換算成半小時）
      m = text.match(/[1一]小時(\d+)元/) || text.match(/小時(\d+)元/);
      if (m) return Math.round(parseInt(m[1], 10) / 2);
      return null;
    }

    if (holiday) {
      var holidayPart = cw.match(/假日[^平]*/) ? cw.match(/假日[^平]*/)[0] : null;
      var mHoliday = holidayPart ? parseHalfHour(holidayPart) : null;
      if (!mHoliday) {
        var part2 = cw.match(/\(2\)[^(]*/);
        mHoliday = part2 ? parseHalfHour(part2[0]) : null;
      }
      p._hh = mHoliday !== null ? mHoliday : parseHalfHour(cw);
    } else {
      var weekdayPart = cw.match(/平日[^假]*/) ? cw.match(/平日[^假]*/)[0] : null;
      var mWeekday = weekdayPart ? parseHalfHour(weekdayPart) : null;
      if (!mWeekday) {
        var part1 = cw.match(/\(1\)[^(]*/);
        mWeekday = part1 ? parseHalfHour(part1[0]) : null;
      }
      p._hh = mWeekday !== null ? mWeekday : parseHalfHour(cw);
    }

    var mMO = cw.match(/(?:每月|月租[：:]?)\s*([\d]+)\s*元/) ||
              cw.match(/計月[收費：:]*(?:每月)?\s*([\d]+)\s*元/);
    p._mo = mMO ? parseInt(mMO[1], 10) : null;
    p._hm = /月租|計月|每月/.test(p.chargeway || '');
  });
}

/* ── recalcDist ── */
function recalcDist() {
  if (refCoord.lat === null || refCoord.lng === null) return;
  D.forEach(function(p) {
    var la = parseFloat(p.lat), lo = parseFloat(p.lng);
    if (!isNaN(la) && !isNaN(lo)) {
      p._dist = calcDist(refCoord.lat, refCoord.lng, la, lo);
    }
  });
}

function updateRefCoord(lat, lng, source) {
  refCoord.lat = lat;
  refCoord.lng = lng;
  refCoord.source = source;
}

/* ── filterData ── */
function filterData() {
  return D.filter(function(p) {
    if (filterState.cDistrict && p.areaname !== filterState.cDistrict) return false;
    if (filterState.cType && p.parkingLotType !== filterState.cType) return false;
    if (filterState.cPH) {
      if (p._hh === null || p._hh > parseInt(filterState.cPH, 10)) return false;
    }
    if (filterState.cPM) {
      if (p._mo === null || p._mo > parseInt(filterState.cPM, 10)) return false;
    }
    if (filterState.cDistKm) {
      var km = parseFloat(filterState.cDistKm);
      if (p._dist === undefined || p._dist > km * 1000) return false;
    }
    if (filterState.cVacancy) {
      if (!(parseInt(p.smallcarVacancy, 10) > 0)) return false;
    }
    if (filterState.cMonthly) {
      if (!p._hm) return false;
    }
    if (filterState.cCube) {
      if (p.parkingLotType !== '立體') return false;
    }
    return true;
  });
}

/* ── sortData ── */
function sortData(fd) {
  return fd.slice().sort(function(a, b) {
    if (a._dist !== undefined && b._dist !== undefined) return a._dist - b._dist;
    if (a._dist !== undefined) return -1;
    if (b._dist !== undefined) return 1;
    return (a.name || '').localeCompare(b.name || '');
  });
}

/* ── renderEmpty ── */
function renderEmpty(container) {
  container.innerHTML =
    '<div class="no-results">' +
    '<div class="no-results-icon">🔍</div>' +
    '<div>找不到符合條件的停車場</div>' +
    '</div>';
}

/* ── showListError ── */
function showListError(msg) {
  var ml = document.getElementById('mobileList');
  if (ml) ml.innerHTML = '<div class="list-error"><span>⚠️</span> ' + msg + '</div>';
}

/* ── renderMobile ── */
function renderMobile(fd) {
  var list = document.getElementById('mobileList');
  document.getElementById('resultCount').textContent = fd.length + ' 筆結果';
  if (fd.length === 0) {
    renderEmpty(list);
    return;
  }
  var MAX = 200;
  var html = '';
  var shown = Math.min(fd.length, MAX);
  for (var i = 0; i < shown; i++) {
    var p = fd[i];
    var vacNum = parseInt(p.smallcarVacancy, 10);

    // 空位狀態
    var vacClass, vacNumStr, vacLabelStr;
    if (vacNum > 0) {
      vacClass = 'vac-ok';
      vacNumStr = vacNum;
      vacLabelStr = '位空位';
    } else if (vacNum === 0) {
      vacClass = 'vac-warn';
      vacNumStr = '客滿';
      vacLabelStr = '';
    } else {
      vacClass = 'vac-na';
      vacNumStr = '—';
      vacLabelStr = '剩餘車位未提供';
    }

    var distStr = p._dist !== undefined ? fmtDist(p._dist) : '';

    // 費率摘要
    var rateParts = [];
    if (p._hh) rateParts.push('<span class="mc-rate-item">⏱ <span class="val">' + p._hh + '元</span>/半hr</span>');
    if (p._mo) rateParts.push('<span class="mc-rate-item mc-rate-monthly">💰 月租 <span class="val">' + p._mo + '元</span></span>');
    var rateSummary = rateParts.length ? rateParts.join('') : '<span style="color:var(--text-muted)">費率未提供</span>';

    html += '<div class="mobile-card ' + vacClass + '">' +
      // 頂部：名稱 + 空位 badge
      '<div class="mc-top">' +
        '<div>' +
          '<div class="mc-name">' + esc(p.name) + '</div>' +
          '<div class="mc-badges" style="margin-top:4px">' +
            '<span class="badge badge-type">' + esc(p.parkingLotType || '') + '</span>' +
            (p._hm ? '<span class="badge badge-monthly">月租</span>' : '') +
          '</div>' +
        '</div>' +
        '<div class="mc-vacancy ' + vacClass + '">' +
          '<span class="mc-vacancy-num">' + vacNumStr + '</span>' +
          (vacLabelStr ? '<span class="mc-vacancy-label">' + vacLabelStr + '</span>' : '') +
        '</div>' +
      '</div>' +
      // 次要資訊
      '<div class="mc-sub">' +
        '<span>📍 ' + esc(p.areaname) + '</span>' +
        (distStr ? '<span class="mc-sub-sep">·</span><span class="mc-dist">' + distStr + '</span>' : '') +
        (p.volumn ? '<span class="mc-sub-sep">·</span><span>共 ' + esc(p.volumn) + ' 格</span>' : '') +
      '</div>' +
      // 費率 + 導航
      '<div class="mc-rate-row">' +
        '<div class="mc-rate-summary">' + rateSummary + '</div>' +
        '<a class="btn-nav" href="' + buildNavUrl(p) + '" target="_blank" rel="noopener">🧭 導航</a>' +
      '</div>' +
      '</div>';
  }
  if (fd.length > MAX) {
    html += '<div style="text-align:center;padding:12px;font-size:.75rem;color:var(--text-muted)">還有 ' + (fd.length - MAX) + ' 筆，請篩選縮小範圍</div>';
  }
  list.innerHTML = html;
}

/* ── render 主流程 ── */
function render() {
  var fd = filterData();
  var sorted = sortData(fd);
  renderMobile(sorted);
}

/* ── 日夜切換 ── */
function toggleTheme() {
  var isDark = document.documentElement.dataset.theme === 'dark';
  document.documentElement.dataset.theme = isDark ? '' : 'dark';
  document.getElementById('themeToggle').textContent = isDark ? '🌙' : '☀️';
}

/* ── 地址搜尋 ── */
function showSearchMsg(text, type) {
  var el = document.getElementById('searchMsg');
  el.textContent = text;
  el.className = 'search-msg search-msg--' + type;
  clearTimeout(el._timer);
  el._timer = setTimeout(function() {
    el.textContent = '';
    el.className = 'search-msg';
  }, 4000);
}

function searchAddress() {
  var addr = document.getElementById('addressSearch').value.trim();
  if (!addr) return;
  var url = buildNominatimUrl(addr);
  fetch(url, { headers: { 'User-Agent': 'ParkNow.TW/2.0' } })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (!data || data.length === 0) {
        showSearchMsg('找不到此地址，請重新輸入', 'error');
        return;
      }
      var lat = parseFloat(data[0].lat);
      var lng = parseFloat(data[0].lon);
      updateRefCoord(lat, lng, 'search');
      recalcDist();
      document.getElementById('distSelect').value = '1';
      filterState.cDistKm = '1';
      render();
      showSearchMsg('✓ 已找到地址', 'success');
    })
    .catch(function() {
      showSearchMsg('地址搜尋失敗，請稍後再試', 'error');
    });
}

/* ── GPS 位置偵測 ── */
function showGeoMsg(text, duration) {
  var el = document.getElementById('geoMsg');
  el.textContent = text;
  el.classList.add('show');
  clearTimeout(el._timer);
  el._timer = setTimeout(function() { el.classList.remove('show'); }, duration);
}

function initGeo() {
  if (!navigator.geolocation) {
    showGeoMsg('無法取得位置，顯示全部停車場', 4000);
    render();
    return;
  }
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      var lat = pos.coords.latitude;
      var lng = pos.coords.longitude;
      updateRefCoord(lat, lng, 'gps');
      recalcDist();
      document.getElementById('distSelect').value = '1';
      filterState.cDistKm = '1';
      showGeoMsg('📍 已取得位置', 3000);
      render();
    },
    function() {
      showGeoMsg('無法取得位置，顯示全部停車場', 4000);
      render();
    },
    { timeout: 8000 }
  );
}

/* ── 城市切換 ── */
function loadScript(src, onSuccess, onError) {
  var s = document.createElement('script');
  s.src = src;
  s.onload = onSuccess;
  s.onerror = function() {
    onError();
    if (s.parentNode) s.parentNode.removeChild(s);
  };
  document.head.appendChild(s);
}

function rebuildDistrictSelect() {
  var sel = document.getElementById('districtSel');
  var areas = [];
  D.forEach(function(p) {
    if (p.areaname && areas.indexOf(p.areaname) === -1) areas.push(p.areaname);
  });
  areas.sort();
  var html = '<option value="">全部行政區</option>';
  areas.forEach(function(a) {
    html += '<option value="' + esc(a) + '">' + esc(a) + '</option>';
  });
  sel.innerHTML = html;
}

function resetFilters() {
  filterState.cDistrict = '';
  filterState.cType = '';
  filterState.cPH = '';
  filterState.cPM = '';
  filterState.cDistKm = '';
  filterState.cVacancy = false;
  filterState.cMonthly = false;
  filterState.cCube = false;
  document.getElementById('districtSel').value = '';
  document.getElementById('rateSelect').value = '';
  document.getElementById('monthlySelect').value = '';
  document.getElementById('distSelect').value = '';
  document.getElementById('typeSelect').value = '';
  document.getElementById('vacancyPill').classList.remove('active');
  document.getElementById('monthlyPill').classList.remove('active');
  document.getElementById('cubePill').classList.remove('active');
  refCoord = { lat: null, lng: null, source: null };
}

function switchCity(cityKey) {
  var cfg = CITIES[cityKey];
  currentCity = cityKey;
  if (CITY_CACHE[cityKey]) {
    D = CITY_CACHE[cityKey];
    parseData(D);
    resetFilters();
    rebuildDistrictSelect();
    render();
    fetchAvailability(CITY_TO_TDX_CODE[cityKey]);
  } else {
    loadScript(cfg.file, function() {
      D = window[cfg.varName];
      if (D) {
        parseData(D);
        CITY_CACHE[cityKey] = D;
      } else {
        D = [];
      }
      resetFilters();
      rebuildDistrictSelect();
      render();
      fetchAvailability(CITY_TO_TDX_CODE[cityKey]);
    }, function() {
      showListError('資料載入失敗');
    });
  }
}

/* ── Availability Proxy 整合 ── */
var PROXY_BASE_URL = 'https://parking-map-wine.vercel.app';
var CITY_TO_TDX_CODE = {
  kaohsiung: 'Kaohsiung',
  tainan:    'Tainan',
  chiayi:    'Chiayi'
};

function showAvailBar(text) {
  var el = document.getElementById('availBar');
  if (!el) return;
  el.textContent = text;
  el.classList.add('show');
}

function formatCachedAt(isoString) {
  if (!isoString) return '—';
  try {
    var d = new Date(isoString);
    if (isNaN(d.getTime())) return '—';
    // 轉換為台灣時區 UTC+8
    var utcMs = d.getTime();
    var twMs  = utcMs + 8 * 60 * 60 * 1000;
    var twDate = new Date(twMs);
    var hh = String(twDate.getUTCHours()).padStart(2, '0');
    var mm = String(twDate.getUTCMinutes()).padStart(2, '0');
    return '空位更新：' + hh + ':' + mm;
  } catch (e) {
    return '—';
  }
}

function applyAvailabilityData(availData) {
  D.forEach(function(p) {
    var avail = availData[p.id];
    if (avail) {
      p.smallcarVacancy   = avail.smallCar;
      p.largecarVacancy   = avail.largeCar;
      p.motorcycleVacancy = avail.motorcycle;
    }
  });
  render();
}

function fetchAvailability(cityCode) {
  var url = PROXY_BASE_URL + '/api/parking-availability?city=' + cityCode;
  showAvailBar('🔄 查詢空位中…');
  fetch(url)
    .then(function(res) { return res.json(); })
    .then(function(json) {
      if (json.data) {
        applyAvailabilityData(json.data);
        showAvailBar('🟢 ' + formatCachedAt(json.cachedAt));
      } else {
        showAvailBar('⚠️ 空位資料暫時無法取得');
      }
    })
    .catch(function() {
      showAvailBar('⚠️ 空位資料暫時無法取得');
    });
}

/* ── 事件綁定 ── */
function bindEvents() {
  document.getElementById('searchBtn').addEventListener('click', searchAddress);
  document.getElementById('addressSearch').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') searchAddress();
  });
  document.getElementById('themeToggle').addEventListener('click', toggleTheme);
  document.getElementById('citySel').addEventListener('change', function() {
    switchCity(this.value);
  });
  document.getElementById('districtSel').addEventListener('change', function() {
    filterState.cDistrict = this.value;
    // 選取行政區時自動取消距離篩選
    if (this.value) {
      filterState.cDistKm = '';
      document.getElementById('distSelect').value = '';
    }
    render();
  });
  document.getElementById('rateSelect').addEventListener('change', function() {
    filterState.cPH = this.value;
    render();
  });
  document.getElementById('monthlySelect').addEventListener('change', function() {
    filterState.cPM = this.value;
    render();
  });
  document.getElementById('distSelect').addEventListener('change', function() {
    filterState.cDistKm = this.value;
    render();
  });
  document.getElementById('typeSelect').addEventListener('change', function() {
    filterState.cType = this.value;
    render();
  });
  document.getElementById('vacancyPill').addEventListener('click', function() {
    filterState.cVacancy = !filterState.cVacancy;
    this.classList.toggle('active', filterState.cVacancy);
    render();
  });
  document.getElementById('monthlyPill').addEventListener('click', function() {
    filterState.cMonthly = !filterState.cMonthly;
    this.classList.toggle('active', filterState.cMonthly);
    render();
  });
  document.getElementById('cubePill').addEventListener('click', function() {
    filterState.cCube = !filterState.cCube;
    this.classList.toggle('active', filterState.cCube);
    render();
  });
}

/* ── 初始化 ── */
window.addEventListener('DOMContentLoaded', function() {
  if (!D.length) {
    D = window.PARKING_DATA || [];
  }
  parseData(D);
  CITY_CACHE.kaohsiung = D;
  rebuildDistrictSelect();

  // 設定今日費率標示（先用週六日判斷，國定假日資料載入後自動更新）
  updateDayLabel();

  bindEvents();
  // 載入國定假日資料（非同步）
  loadHolidayData();
  initGeo();

  // 非同步取得即時空位資料（不阻塞頁面渲染）
  fetchAvailability(CITY_TO_TDX_CODE[currentCity]);
});

})();
</script>
